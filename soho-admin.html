<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사 대시보드 | 소상공인 새출발 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyB8g1dCEwJ5FrE9c6a4hVEONQdOwTsQ8hU",
    authDomain: "nohoo-diagnosis.firebaseapp.com",
    projectId: "nohoo-diagnosis",
    storageBucket: "nohoo-diagnosis.firebasestorage.app",
    messagingSenderId: "719141943540",
    appId: "1:719141943540:web:c9b29f194ba451a0e186a1"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db=db; window._fbReady=true;
  window._getDocs=getDocs; window._collection=collection;
  window._doc=doc; window._deleteDoc=deleteDoc; window._onSnapshot=onSnapshot;
</script>
<style>
:root{
  --primary:#1B3F6E;--primary-mid:#2A5FA0;--primary-light:#E8F0FA;
  --gold:#E8A020;
  --ink:#1A1A1A;--ink-mid:#4A4A4A;--ink-light:#8A8A8A;
  --line:#E8E8E8;--bg:#F5F6F8;--white:#FFFFFF;
  --good:#2E7D5A;--good-bg:#EAF5EE;--good-border:#A8D8BC;
  --warn:#B06000;--warn-bg:#FDF3E3;--warn-border:#F0C070;
  --danger:#B03030;--danger-bg:#FAEAEA;--danger-border:#F0A0A0;
  --r:10px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#071828 0%,var(--primary) 55%,#2A5FA0 100%);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;top:-30%;right:-20%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.1),transparent 70%)}
.login-card{background:rgba(255,255,255,.97);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.3);position:relative;z-index:1}
.login-top{text-align:center;margin-bottom:2.5rem}
.login-emblem{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-mid));display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(27,63,110,.3)}
.login-emblem svg{width:34px;height:34px;fill:none;stroke:#fff;stroke-width:2}
.login-brand{font-size:12px;font-weight:600;letter-spacing:2px;color:var(--ink-light);text-transform:uppercase;margin-bottom:.5rem}
.login-title{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.5px;margin-bottom:.3rem}
.login-sub{font-size:14px;color:var(--ink-light)}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--ink-mid);letter-spacing:.5px;margin-bottom:.5rem;text-transform:uppercase}
.login-input{width:100%;padding:16px 18px;background:#F8F7F5;border:2px solid var(--line);border-radius:var(--r);font-size:20px;text-align:center;letter-spacing:8px;outline:none;font-family:inherit;color:var(--ink);transition:all .2s}
.login-input:focus{border-color:var(--primary);background:#fff}
.login-err{font-size:13px;color:var(--danger);text-align:center;min-height:20px;margin:.5rem 0}
.login-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-mid));color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(27,63,110,.3);transition:all .2s}
.login-btn:hover{transform:translateY(-1px)}
.login-footer{text-align:center;margin-top:1.5rem;font-size:12px;color:var(--ink-light)}
.login-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--good);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* APP */
.app{display:none;min-height:100vh;flex-direction:column}
.app.active{display:flex}
.topbar{background:linear-gradient(135deg,#071828,var(--primary));height:64px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-logo{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:18px}
.tb-title{font-size:16px;font-weight:700;color:#fff}
.tb-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(232,160,32,.25);color:var(--gold);font-weight:600}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s;display:flex;align-items:center;gap:5px}
.tb-btn:hover{opacity:.85}
.tb-refresh{background:rgba(255,255,255,.12);color:#fff}
.tb-csv{background:var(--gold);color:#1A1A00}
.tb-print{background:rgba(255,255,255,.12);color:#fff}
.tb-qr{background:rgba(255,255,255,.12);color:#fff}
.tb-anon{background:rgba(255,255,255,.12);color:#fff}
.tb-anon.on{background:rgba(232,160,32,.3);color:var(--gold)}
.tb-logout{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}

/* LIVE */
.live-banner{background:linear-gradient(90deg,#071828,var(--primary),#071828);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.live-left{display:flex;align-items:center;gap:1.5rem}
.live-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;animation:pulse 1.5s infinite;flex-shrink:0}
.live-label{font-size:12px;color:rgba(255,255,255,.5);font-weight:500;letter-spacing:.5px}
.live-count{font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px}
.live-avg{font-size:22px;font-weight:900;letter-spacing:-1px}
.live-unit{font-size:12px;color:rgba(255,255,255,.5);margin-left:3px}
.live-sep{width:1px;height:32px;background:rgba(255,255,255,.12)}
.live-right{font-size:12px;color:rgba(255,255,255,.4)}

/* FILTERS */
.filter-bar{background:var(--white);border-bottom:1px solid var(--line);padding:.75rem 2rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-label{font-size:12px;font-weight:700;color:var(--ink-mid);letter-spacing:.3px}
.filter-select{padding:7px 12px;border:1.5px solid var(--line);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;background:var(--white);cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:var(--primary)}
.filter-active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.filter-clear{padding:7px 12px;border:1.5px solid var(--danger-border);border-radius:var(--r);font-size:13px;cursor:pointer;font-family:inherit;background:var(--white);color:var(--danger)}
.filter-result{font-size:13px;color:var(--ink-light);margin-left:auto}

/* ALERT */
.alert-banner{margin:1.5rem 2rem 0;border-radius:var(--r-lg);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;border:1px solid}
.ab-icon{font-size:22px;flex-shrink:0}
.ab-title{font-size:13px;font-weight:700;margin-bottom:2px}
.ab-desc{font-size:13px}

/* MAIN */
.main{flex:1;padding:1.5rem 2rem 3rem;max-width:1400px;width:100%;margin:0 auto}
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:1.5rem}
.metric-card{background:var(--white);border-radius:var(--r-lg);padding:1.25rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--line)}
.metric-label{font-size:11px;color:var(--ink-light);font-weight:600;letter-spacing:.5px;margin-bottom:.5rem;text-transform:uppercase}
.metric-value{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1}
.metric-sub{font-size:12px;color:var(--ink-light);margin-top:.3rem}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--white);border-radius:var(--r-lg);padding:5px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--line);width:fit-content}
.tab{padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--ink-light);font-family:inherit;transition:all .15s}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(27,63,110,.3)}
.tab-content{display:none}.tab-content.active{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.5rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:1.5rem}
.card{background:var(--white);border-radius:var(--r-lg);padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--line)}
.card-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:.25rem}
.card-sub{font-size:12px;color:var(--ink-light);margin-bottom:1.25rem}
.chart-wrap{position:relative;height:260px}
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.hl-box{border-radius:var(--r-lg);padding:1.1rem 1.25rem;border:1px solid}
.s-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.s-nm{font-size:13px;color:var(--ink-mid);flex:0 0 80px;font-weight:500}
.s-bar-bg{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.s-bar{height:100%;border-radius:999px}
.s-val{font-size:14px;font-weight:700;width:28px;text-align:right}
.qlist-row{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.qlist-row:last-child{border-bottom:none}
.qlist-rank{font-size:13px;font-weight:900;width:20px;flex-shrink:0}
.qlist-txt{font-size:13px;line-height:1.5;flex:1;color:var(--ink);word-break:keep-all}
.qlist-meta{font-size:11px;color:var(--ink-light);margin-top:2px}
.qlist-score{font-size:15px;font-weight:700;flex-shrink:0}

/* TABLE */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.search-box{padding:8px 14px;border:1.5px solid var(--line);border-radius:var(--r);font-size:13px;outline:none;font-family:inherit;min-width:180px;transition:border-color .2s}
.search-box:focus{border-color:var(--primary)}
.sort-btn{padding:7px 14px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--white);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.sort-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.count-badge{font-size:13px;color:var(--ink-light);margin-left:auto}
.table-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#F0EFEc;padding:10px 14px;text-align:left;font-weight:700;color:var(--ink-mid);border-bottom:2px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{background:#E8E7E4}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:hover td{background:#FAFAF8}
.tbl tr:last-child td{border-bottom:none}
.score-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.btn-detail{padding:5px 12px;border:1.5px solid var(--line);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink-mid);font-family:inherit;transition:all .15s}
.btn-detail:hover{border-color:var(--primary);color:var(--primary)}
.btn-del{padding:5px 10px;border:1.5px solid var(--danger-border);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--danger);font-family:inherit}
.btn-del:hover{background:var(--danger-bg)}
.area-tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.area-tab{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid;cursor:pointer;background:var(--white);font-family:inherit;transition:all .15s}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-ov.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--line);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:1.5rem}
.modal-chart-wrap{height:240px;margin-bottom:1.5rem}
.qr-modal-body{padding:2rem;text-align:center}
.qr-wrap{display:inline-block;padding:20px;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin:1.5rem 0}

/* DATE GROUP */
.date-group-header{background:var(--primary-light);border-radius:var(--r);padding:.6rem 1rem;font-size:13px;font-weight:700;color:var(--primary);margin:12px 0 6px;display:flex;align-items:center;justify-content:space-between}
.date-group-count{font-size:12px;color:var(--ink-light);font-weight:500}

.spin{width:32px;height:32px;border:2.5px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;margin:3rem auto}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--ink-light);font-size:15px;line-height:1.75}

@media print{
  .topbar,.live-banner,.filter-bar,.toolbar,.tb-btn,.btn-del,.btn-detail,.modal-ov,.tabs{display:none!important}
  .app{display:block!important}
  .card{break-inside:avoid;box-shadow:none}
  body{background:#fff}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-top">
      <div class="login-emblem">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="login-brand">Restart Compass</div>
      <div class="login-title">강사 전용 대시보드</div>
      <div class="login-sub">소상공인 새출발 진단 · 교육자 분석</div>
    </div>
    <div class="login-field" style="margin-bottom:1.25rem">
      <label>비밀번호</label>
      <input type="password" id="pwIn" class="login-input" placeholder="••••" maxlength="10" autocomplete="off">
    </div>
    <div class="login-err" id="pwErr"></div>
    <button class="login-btn" onclick="checkLogin()">대시보드 입장</button>
    <div class="login-footer"><span class="login-dot"></span>Firebase 실시간 연동 중</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">📊</div>
      <div class="tb-title">소상공인 새출발 대시보드</div>
      <div class="tb-badge">Restart Compass</div>
    </div>
    <div class="tb-right">
      <button class="tb-btn tb-refresh" onclick="loadData()">🔄 새로고침</button>
      <button class="tb-btn tb-qr" onclick="showQR()">📱 QR 코드</button>
      <button class="tb-btn tb-anon" id="anonBtn" onclick="toggleAnon()">👁 익명 ON</button>
      <button class="tb-btn tb-csv" onclick="exportCSV()">⬇ CSV</button>
      <button class="tb-btn tb-print" onclick="window.print()">🖨️ 인쇄</button>
      <button class="tb-btn tb-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- LIVE -->
  <div class="live-banner">
    <div class="live-left">
      <div class="live-dot"></div>
      <div><div class="live-label">LIVE · 실시간</div><div style="display:flex;align-items:baseline;gap:6px"><span class="live-count" id="liveCount">0</span><span class="live-unit">명 완료</span></div></div>
      <div class="live-sep"></div>
      <div><div class="live-label">전체 평균</div><div style="display:flex;align-items:baseline;gap:4px"><span class="live-avg" id="liveAvg" style="color:#4ADE80">--</span><span class="live-unit">점</span></div></div>
      <div class="live-sep"></div>
      <div><div class="live-label">최고</div><div style="display:flex;align-items:baseline;gap:4px"><span class="live-avg" id="liveMax" style="color:#E8A020">--</span><span class="live-unit">점</span></div></div>
      <div class="live-sep"></div>
      <div><div class="live-label">최저</div><div style="display:flex;align-items:baseline;gap:4px"><span class="live-avg" id="liveMin" style="color:#F87171">--</span><span class="live-unit">점</span></div></div>
    </div>
    <div class="live-right" id="liveTime">마지막 업데이트: --</div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">🔍 필터</span>
    <select id="filterDate" class="filter-select" onchange="applyFilter()">
      <option value="">날짜 전체</option>
    </select>
    <select id="filterRegion" class="filter-select" onchange="applyFilter()">
      <option value="">지역 전체</option>
    </select>
    <select id="filterBiz" class="filter-select" onchange="applyFilter()">
      <option value="">업종 전체</option>
    </select>
    <button class="filter-clear" onclick="clearFilter()">✕ 필터 초기화</button>
    <div class="filter-result" id="filterResult"></div>
  </div>

  <div class="main" id="mainContent"><div class="spin"></div></div>
</div>

<!-- MODAL: 상세 -->
<div class="modal-ov" id="modalOv" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="document.getElementById('modalOv').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- MODAL: QR -->
<div class="modal-ov" id="qrOv" onclick="closeQR(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">📱 교육생 QR 코드</div>
      <button class="modal-close" onclick="document.getElementById('qrOv').classList.remove('open')">✕</button>
    </div>
    <div class="qr-modal-body">
      <div style="font-size:15px;font-weight:700;margin-bottom:.5rem">빔프로젝터에 띄워주세요</div>
      <div style="font-size:13px;color:var(--ink-light);margin-bottom:1.25rem">교육생이 QR 스캔 → 바로 진단 시작</div>
      <div class="qr-wrap"><div id="qrCode"></div></div>
      <div style="font-size:13px;color:var(--ink-light);word-break:break-all;margin-bottom:1rem">sensejob2805.github.io/soho-diagnosis</div>
      <div style="font-size:13px;color:var(--ink-light);line-height:1.6">📌 "결과 저장하기" 버튼을 눌러야<br>이 대시보드에 집계됩니다</div>
    </div>
  </div>
</div>

<script>
const ADMIN_PW='1234';
const STUDENT_URL='https://sensejob2805.github.io/soho-diagnosis';
const AREAS=[
  {n:'심리·정서 회복',l:'가',c:'#7B4F9E'},{n:'재무 재건',l:'나',c:'#1A6B8A'},
  {n:'건강관리',l:'다',c:'#2A5C45'},{n:'재기 준비',l:'라',c:'#C0392B'},

function scBg(s){return s>=4?'#EAF5EE':s>=3?'#FDF3E3':'#FAEAEA';}

function checkLogin(){
  if(document.getElementById('pwIn').value===ADMIN_PW){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appWrap').classList.add('active');
    loadData();
  } else {
    document.getElementById('pwErr').textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pwIn').value='';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')checkLogin();});
function logout(){document.getElementById('loginPage').style.display='flex';document.getElementById('appWrap').classList.remove('active');allData=[];}

async function loadData(){
  const main=document.getElementById('mainContent');
  main.innerHTML='<div class="spin"></div>';
  allData=[];
  try{
    if(window._fbReady){
      const snap=await window._getDocs(window._collection(window._db,'soho_results'));
      snap.forEach(d=>allData.push({...d.data(),_docId:d.id}));
      allData.sort((a,b)=>(b.ts||0)-(a.ts||0));
    }
  }catch(e){main.innerHTML='<div class="empty">데이터 로드 오류: '+e.message+'</div>';return;}
  updateLiveBanner();
  buildFilterOptions();
  applyFilter();
}

function updateLiveBanner(){
  const n=allData.length;
  document.getElementById('liveCount').textContent=n;
  if(n>0){
    const scores=allData.map(r=>r.total);
    const avg=+(scores.reduce((a,b)=>a+b,0)/n).toFixed(1);
    document.getElementById('liveAvg').textContent=avg;
    document.getElementById('liveAvg').style.color=sc(avg);
    document.getElementById('liveMax').textContent=Math.max(...scores).toFixed(1);
    document.getElementById('liveMin').textContent=Math.min(...scores).toFixed(1);
  }
  document.getElementById('liveTime').textContent='마지막 업데이트: '+new Date().toLocaleTimeString('ko-KR');
}

function buildFilterOptions(){
  const dates=[...new Set(allData.map(r=>r.dateOnly||r.date?.split(' ')[0]||'').filter(Boolean))].sort().reverse();
  const regions=[...new Set(allData.map(r=>r.region||'').filter(Boolean))].sort();
  const bizs=[...new Set(allData.map(r=>r.biz||'').filter(Boolean))].sort();

  const dSel=document.getElementById('filterDate');
  const curD=dSel.value;
  dSel.innerHTML='<option value="">날짜 전체</option>'+dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  if(curD)dSel.value=curD;

  const rSel=document.getElementById('filterRegion');
  const curR=rSel.value;
  rSel.innerHTML='<option value="">지역 전체</option>'+regions.map(r=>`<option value="${r}">${r}</option>`).join('');
  if(curR)rSel.value=curR;

  const bSel=document.getElementById('filterBiz');
  const curB=bSel.value;
  bSel.innerHTML='<option value="">업종 전체</option>'+bizs.map(b=>`<option value="${b}">${b}</option>`).join('');
  if(curB)bSel.value=curB;
}

function applyFilter(){
  filterDateVal=document.getElementById('filterDate').value;
  filterRegionVal=document.getElementById('filterRegion').value;
  filterBizVal=document.getElementById('filterBiz').value;

  filteredData=allData.filter(r=>{
    const dMatch=!filterDateVal||(r.dateOnly||r.date?.split(' ')[0]||'')===filterDateVal;
    const rMatch=!filterRegionVal||(r.region||'')===filterRegionVal;
    const bMatch=!filterBizVal||(r.biz||'')===filterBizVal;
    return dMatch&&rMatch&&bMatch;
  });

  // highlight active filters
  ['filterDate','filterRegion','filterBiz'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.toggle('filter-active',!!el.value);
  });

  const res=document.getElementById('filterResult');
  if(filterDateVal||filterRegionVal||filterBizVal){
    res.textContent=`필터 결과: ${filteredData.length}명 / 전체 ${allData.length}명`;
    res.style.color='var(--primary)';
  } else {
    res.textContent=`전체 ${allData.length}명`;
    res.style.color='var(--ink-light)';
  }

  if(!filteredData.length){
    document.getElementById('mainContent').innerHTML='<div class="empty">선택한 조건에 해당하는 데이터가 없습니다.</div>';
    return;
  }
  renderDashboard();
}

function clearFilter(){
  document.getElementById('filterDate').value='';
  document.getElementById('filterRegion').value='';
  document.getElementById('filterBiz').value='';
  applyFilter();
}

  anonMode=!anonMode;

    </div>
  </div>`;

  // TAB: DATE VIEW
  const byDate={};
  data.forEach(r=>{
    const d=r.dateOnly||r.date?.split(' ')[0]||'날짜 미상';
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(r);
  });
  const sortedDates=Object.keys(byDate).sort().reverse();
  h+=`<div class="tab-content" id="tab-dateview"><div class="card">
    <div class="card-title" style="margin-bottom:.5rem">날짜별 응답 현황</div>
    <div class="card-sub">교육 날짜별로 참가자와 점수를 확인할 수 있어요</div>`;
  sortedDates.forEach(d=>{
    const group=byDate[d];
    const avg=+(group.reduce((s,r)=>s+r.total,0)/group.length).toFixed(1);
    const regions=[...new Set(group.map(r=>r.region||'').filter(Boolean))].join('·')||'-';
    h+=`<div class="date-group-header">
      <span>📅 ${d} · ${regions}</span>
      <span class="date-group-count">${group.length}명 · 평균 <span style="color:${sc(avg)};font-weight:700">${avg}점</span></span>
    </div>
    <table class="tbl" style="margin-bottom:12px">
      <thead><tr><th>이름</th><th>지역</th><th>업종</th><th>종합</th>${AREAS.map(a=>`<th>${a.l}</th>`).join('')}<th>상세</th></tr></thead>
      <tbody>${group.map((r,idx)=>{
        const origIdx=allData.indexOf(r);
        const name=displayName(r.name,origIdx);
        return`<tr><td style="font-weight:700">${name}</td><td>${r.region||'-'}</td><td>${r.biz||'-'}</td><td><span class="score-pill" style="background:${scBg(r.total)};color:${sc(r.total)}">${r.total}</span></td>${(r.scores||[]).map(s=>`<td style="color:${sc(s)};font-weight:600;text-align:center">${s}</td>`).join('')}<td><button class="btn-detail" onclick="showDetail(${origIdx})">상세</button></td></tr>`;
      }).join('')}</tbody>
    </table>`;
  });
  h+='</div></div>';

  document.getElementById('mainContent').innerHTML=h;
  setTimeout(()=>{
    if(radarChart)radarChart.destroy();
    radarChart=makeRadar('radarC',grp);
    renderTableOnly();
    selectAreaTab2(0);
  },80);
}

function renderTableOnly(){
  const tbody=document.getElementById('respTbody');
  const badge=document.getElementById('countBadge');
  if(!tbody)return;
  let data=[...filteredData];
  if(searchStr) data=data.filter((r,i)=>anonMode?('참가자'+(i+1)).includes(searchStr):r.name?.includes(searchStr));
  data.sort((a,b)=>{
    if(sortKey==='name') return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
    if(sortKey==='total') return sortDir==='asc'?a.total-b.total:b.total-a.total;
    return sortDir==='asc'?(a.ts||0)-(b.ts||0):(b.ts||0)-(a.ts||0);
  });
  if(badge) badge.textContent='총 '+data.length+'명';
  tbody.innerHTML=data.map((r,dispIdx)=>{
    const origIdx=allData.indexOf(r);
    const name=displayName(r.name,origIdx);
    return`<tr>
      <td style="font-weight:700">${name}</td>
      <td><span class="tag-pill" style="background:var(--primary-light);color:var(--primary)">${r.region||'-'}</span></td>
      <td><span class="tag-pill" style="background:#F5F0FF;color:#7B4F9E">${r.biz||'-'}</span></td>
      <td style="color:var(--ink-light);font-size:12px">${r.date}</td>
      <td><span class="score-pill" style="background:${scBg(r.total)};color:${sc(r.total)}">${r.total}점</span></td>
      ${(r.scores||[]).map(s=>`<td style="color:${sc(s)};font-weight:600;text-align:center">${s}</td>`).join('')}
      <td><button class="btn-detail" onclick="showDetail(${origIdx})">상세</button></td>
      <td><button class="btn-del" onclick="deleteResult('${r._docId||r.name}','${r.name}')">삭제</button></td>
    </tr>`;
  }).join('');
}
function filterTable(){searchStr=document.getElementById('searchInput')?.value||'';renderTableOnly();}
function setSortTable(key,dir){sortKey=key;sortDir=dir;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderTableOnly();}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  const idx={'overview':0,'detail':1,'analysis':2,'dateview':3}[id];
  document.querySelectorAll('.tab')[idx]?.classList.add('active');
  if(id==='detail')renderTableOnly();
}

function selectAreaTab2(idx){
  AREAS.forEach((ar,i)=>{const t=document.getElementById('atab2-'+i);if(!t)return;if(i===idx){t.style.background=ar.c;t.style.color='#fff';t.style.borderColor=ar.c;}else{t.style.background='#fff';t.style.color=ar.c;t.style.borderColor=ar.c+'55';}});
  const el=document.getElementById('areaQDetail2');if(!el)return;
  const qAvg=window._qAvg||[];
  const qs=QS_ORIG.filter(q=>q.a===idx).sort((a,b)=>(qAvg[a.id]||0)-(qAvg[b.id]||0));
  el.innerHTML=`<table class="tbl"><thead><tr><th>문항 내용</th><th style="width:140px">그룹 평균</th></tr></thead><tbody>`+
    qs.map(q=>{const avg=qAvg[q.id];if(!avg)return'';return`<tr><td style="word-break:keep-all">${q.t}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:7px;background:var(--line);border-radius:999px;overflow:hidden"><div style="width:${avg/5*100}%;height:100%;background:${sc(avg)};border-radius:999px"></div></div><span style="font-size:14px;font-weight:700;color:${sc(avg)};width:28px;text-align:right">${avg}</span></div></td></tr>`;}).join('')+
  `</tbody></table>`;
}

function makeRadar(id,scores){
  const ctx=document.getElementById(id)?.getContext('2d');if(!ctx)return null;
  return new Chart(ctx,{type:'radar',
    data:{labels:AREAS.map(a=>a.l+'.'+a.n),datasets:[{data:scores,borderColor:'#1B3F6E',backgroundColor:'rgba(27,63,110,0.08)',borderWidth:2,pointBackgroundColor:scores.map(s=>sc(s)),pointRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},backdropColor:'transparent',color:'#9CA3AF'},grid:{color:'rgba(0,0,0,0.06)'},pointLabels:{font:{size:11,weight:'600'},color:'#4A4A4A',padding:8},angleLines:{color:'rgba(0,0,0,0.06)'}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'점'}}}}
  });
}

function showDetail(idx){
  const r=allData[idx];if(!r)return;
  const name=displayName(r.name,idx);
  document.getElementById('modalTitle').textContent=name+'님 상세 결과';
  let b=`<div style="text-align:center;padding:.75rem 0 1.5rem;border-bottom:1px solid var(--line);margin-bottom:1.25rem">
    <div style="font-size:12px;color:var(--ink-light)">${r.date} · ${r.region||''} · ${r.biz||''}</div>
    <div style="font-size:44px;font-weight:900;color:${sc(r.total)};margin:.25rem 0;letter-spacing:-2px">${r.total}</div>
    <div style="font-size:14px;color:var(--ink-light)">종합 평균</div>
  </div><div class="modal-chart-wrap"><canvas id="detailC"></canvas></div>`;
  r.scores?.forEach((s,i)=>{const c=sc(s);b+=`<div class="s-row"><span class="s-nm" style="font-size:13px">${AREAS[i].l}. ${AREAS[i].n}</span><div class="s-bar-bg"><div class="s-bar" style="width:${s/5*100}%;background:${c}"></div></div><span class="s-val" style="font-size:15px;color:${c}">${s}</span></div>`;});
  if(r.qScores){
    b+=`<div style="margin-top:1.25rem;font-size:15px;font-weight:700;margin-bottom:1rem">문항별 응답 상세</div>`;
    AREAS.forEach((ar,ai)=>{
      b+=`<div style="font-size:13px;font-weight:700;color:${ar.c};margin:12px 0 6px;padding-top:10px;border-top:1px solid var(--line)">${ar.l}. ${ar.n}</div>`;
      QS_ORIG.filter(q=>q.a===ai).forEach(q=>{const v=r.qScores[q.id]||0;const c=sc(v);b+=`<div style="padding:8px 0;border-bottom:1px solid #F5F5F5;display:flex;gap:10px;align-items:flex-start"><div style="font-size:12px;line-height:1.5;flex:1;color:#4A4A4A;word-break:keep-all">${q.t}</div><div style="font-size:14px;font-weight:700;color:${c};flex-shrink:0;min-width:32px;text-align:right">${v}점</div></div>`;});
    });
  }
  document.getElementById('modalBody').innerHTML=b;
  document.getElementById('modalOv').classList.add('open');
  setTimeout(()=>{if(detailChart)detailChart.destroy();detailChart=makeRadar('detailC',r.scores);},80);
}
function closeModal(e){if(e.target===document.getElementById('modalOv'))document.getElementById('modalOv').classList.remove('open');}

function showQR(){
  document.getElementById('qrOv').classList.add('open');
  const el=document.getElementById('qrCode');
  if(!el.querySelector('canvas')&&!el.querySelector('img')){
    new QRCode(el,{text:STUDENT_URL,width:200,height:200,colorDark:'#1B3F6E',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  }
}
function closeQR(e){if(e.target===document.getElementById('qrOv'))document.getElementById('qrOv').classList.remove('open');}

async function deleteResult(docId,name){
  if(!confirm(`"${name}"님의 결과를 삭제하시겠습니까?`))return;
  try{
    await window._deleteDoc(window._doc(window._db,'soho_results',docId));
    allData=allData.filter(r=>(r._docId||r.name)!==docId);
    filteredData=filteredData.filter(r=>(r._docId||r.name)!==docId);
    updateLiveBanner();
    buildFilterOptions();
    renderDashboard();
  }catch(e){alert('삭제 오류: '+e.message);}
}

function exportCSV(){
  if(!filteredData.length){alert('데이터가 없습니다.');return;}
  const headers=['이름','지역','업종','진단일시','종합평균',...AREAS.map(a=>a.l+'.'+a.n),...QS_ORIG.map(q=>'Q'+String(q.id+1).padStart(2,'0'))];
  const rows=filteredData.map(r=>[r.name,r.region||'',r.biz||'',r.date,r.total,...(r.scores||[]),...(r.qScores?QS_ORIG.map(q=>r.qScores[q.id]||0):new Array(40).fill(''))]);
  const csv='\uFEFF'+[headers,...rows].map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const filterInfo=(filterDateVal||filterRegionVal||filterBizVal)?`_${[filterDateVal,filterRegionVal,filterBizVal].filter(Boolean).join('_')}`:'';
  a.download=`소상공인새출발진단${filterInfo}_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'').replace('.','')}.csv`;
  a.click();URL.revokeObjectURL(url);
}
</script>
